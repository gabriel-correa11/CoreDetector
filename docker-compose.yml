services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-secret}
      - RATE_LIMIT_IMAGE=${RATE_LIMIT_IMAGE:-3/minute}
      - AUTHORIZED_USERS=${AUTHORIZED_USERS}
      - WA_AUTHORIZED_USERS=${WA_AUTHORIZED_USERS}
      - WPP_BASE_URL=http://evolution:8080
      - WPP_SESSION=${WPP_SESSION:-default}
      - WPP_AUTH_TOKEN=${WPP_AUTH_TOKEN}
      - RATE_LIMIT_WHATSAPP_USER=${RATE_LIMIT_WHATSAPP_USER:-10}
      - RATE_LIMIT_WHATSAPP_IMAGE=${RATE_LIMIT_WHATSAPP_IMAGE:-3}
    depends_on:
      - evolution
    networks:
      - backend
    restart: unless-stopped

  telegram_bot:
    build: .
    command: python -m src.bot.telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://api:8000
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-secret}
      - TELEGRAM_AUTHORIZED_USERS=${TELEGRAM_AUTHORIZED_USERS}
      - RATE_LIMIT_TELEGRAM_USER=${RATE_LIMIT_TELEGRAM_USER:-10}
      - RATE_LIMIT_TELEGRAM_IMAGE=${RATE_LIMIT_TELEGRAM_IMAGE:-3}
    depends_on:
      - api
    networks:
      - backend
    restart: unless-stopped

  evolution:
    image: atendai/evolution-api:latest
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${WPP_AUTH_TOKEN}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - WEBHOOK_GLOBAL_URL=http://api:8000/webhook/whatsapp
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - QRCODE_LIMIT=30
      - DEL_INSTANCE=false
      - WEBHOOK_BASE64=true
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge
    internal: false

volumes:
  evolution_instances:
  evolution_store:
