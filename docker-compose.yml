services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-secret}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - AUTHORIZED_USERS=${AUTHORIZED_USERS}
    restart: unless-stopped
