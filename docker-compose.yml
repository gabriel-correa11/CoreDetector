services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-secret}
      - RATE_LIMIT_IMAGE=${RATE_LIMIT_IMAGE:-3/minute}
      - AUTHORIZED_USERS=${AUTHORIZED_USERS}
      - WA_AUTHORIZED_USERS=${WA_AUTHORIZED_USERS}
      - WPP_BASE_URL=http://wppconnect:21465
      - WPP_SESSION=${WPP_SESSION:-default}
      - WPP_AUTH_TOKEN=${WPP_AUTH_TOKEN}
      - RATE_LIMIT_WHATSAPP_USER=${RATE_LIMIT_WHATSAPP_USER:-10}
      - RATE_LIMIT_WHATSAPP_IMAGE=${RATE_LIMIT_WHATSAPP_IMAGE:-3}
    depends_on:
      - wppconnect
    networks:
      - backend
    restart: unless-stopped

  telegram_bot:
    build: .
    command: python -m src.bot.telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://api:8000
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-secret}
      - TELEGRAM_AUTHORIZED_USERS=${TELEGRAM_AUTHORIZED_USERS}
      - RATE_LIMIT_TELEGRAM_USER=${RATE_LIMIT_TELEGRAM_USER:-10}
      - RATE_LIMIT_TELEGRAM_IMAGE=${RATE_LIMIT_TELEGRAM_IMAGE:-3}
    depends_on:
      - api
    networks:
      - backend
    restart: unless-stopped

  wppconnect:
    build:
      context: https://github.com/wppconnect-team/wppconnect-server.git
      dockerfile: Dockerfile
    ports:
      - "21465:21465"
    volumes:
      - wppconnect_data:/usr/src/wpp-server/tokens
    environment:
      - SECRET_KEY=${WPP_SECRET_KEY}
      - AUTH_TOKEN=${WPP_AUTH_TOKEN}
      - WEBHOOK_URL=http://api:8000/webhook/whatsapp
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge
    internal: false

volumes:
  wppconnect_data:
